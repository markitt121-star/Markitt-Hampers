<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markitt Hamper Service</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --gold:#c6a75e;
  --gold-light:#e6d3a3;
  --dark:#0f0f0f;
  --charcoal:#1b1b1b;
  --glass: rgba(255,255,255,0.05);
  --shadow: rgba(0,0,0,0.4);
}

body {
  margin:0;
  font-family:'Playfair Display', serif;
  background:linear-gradient(145deg,#0f0f0f,#1a1a1a);
  color:#fff;
}

/* Header */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  backdrop-filter:blur(10px);
  background: var(--glass);
  border-radius: 15px;
  box-shadow: 0 4px 30px var(--shadow);
  flex-wrap: wrap;
}
.logo-area{
  display:flex;
  align-items:center;
  gap:10px;
}
.logo-area img{ height:50px; }
.brand-text{ font-family:'Cinzel', serif; font-size:22px; font-weight:700; color: var(--gold); white-space:nowrap; }
.tagline{ font-size:12px; color:#aaa; white-space:nowrap; }
.total-orders{ border:1px solid var(--gold); padding:8px 22px; border-radius:40px; color:var(--gold-light); font-weight:600; margin-top:10px; }

/* Container */
.container { max-width:1100px; margin:30px auto; padding:0 20px; }

/* Slider */
.slider { position:relative; height:350px; border-radius:20px; overflow:hidden; margin-bottom:30px; box-shadow:0 10px 30px rgba(0,0,0,0.15); }
.slider img{ width:100%; height:100%; object-fit:cover; position:absolute; top:0; left:0; opacity:0; transition:all 1s ease; }
.slider img.active{ opacity:1; }
.slider-arrow{
  position:absolute; top:50%; transform:translateY(-50%);
  font-size:28px; color:white; background:rgba(0,0,0,0.3);
  padding:10px 15px; border-radius:50%; cursor:pointer; user-select:none;
}
.slider-arrow.left{ left:10px; }
.slider-arrow.right{ right:10px; }

/* Currency */
.currency-select{ padding:20px 30px; }
.currency-select select{
  padding:10px 20px; border-radius:40px; border:1px solid var(--gold);
  background:transparent; color:var(--gold); font-weight:600; transition:0.3s;
}
.currency-select select:hover{ box-shadow:0 0 10px var(--gold); }

/* Hamper Grid */
.hampers-grid{
  display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:30px; padding:40px;
}
.hamper-card{
  background: var(--glass); backdrop-filter: blur(10px); border-radius:25px; border:1px solid rgba(255,255,255,0.1); overflow:hidden; transition:0.4s;
}
.hamper-card:hover{ transform:translateY(-12px); box-shadow:0 25px 60px rgba(0,0,0,0.7); }
.hamper-card img{ width:100%; height:200px; object-fit:cover; filter:brightness(85%); }
.hamper-content{ padding:20px; }
.hamper-content h3{ font-family:'Cinzel', serif; color:var(--gold); }
.items-list{ color:#aaa; font-size:14px; margin:12px 0; }
.price{ font-weight:700; color:var(--gold-light); font-size:18px; margin-bottom:12px; transition:0.4s; }
select,input,textarea{ width:100%; padding:10px; margin-bottom:10px; border-radius:12px; border:1px solid #333; background:#111; color:#fff; transition:0.3s; }
select:focus,input:focus,textarea:focus{ border:1px solid var(--gold); box-shadow:0 0 10px rgba(198,167,94,0.4); outline:none; }
button{ padding:12px 20px; border:none; border-radius:40px; background:linear-gradient(90deg,var(--gold),var(--gold-light)); color:#111; font-weight:700; cursor:pointer; transition:0.4s; letter-spacing:1px; }
button:hover{ box-shadow:0 0 20px rgba(198,167,94,0.6); transform:translateY(-2px); }

/* Payment Box */
.payment-box{ margin:20px 30px; padding:20px; border-radius:15px; background: var(--glass); backdrop-filter: blur(10px); border:1px solid rgba(255,255,255,0.1); }
.payment-box h3{ color: var(--gold); margin-bottom:15px; }
.payment-row{ display:flex; justify-content: space-between; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.1); font-size:14px; }
.payment-row:last-child{ border-bottom:none; }
.label{ font-weight:600; color:#ddd; }
.value{ font-weight:500; color:#fff; text-align:right; }
.iban{ font-family: monospace; letter-spacing:1px; }
.total-price{ font-weight:bold; text-align:right; color:var(--gold-light); font-size:18px; }

/* Live Summary */
.live-summary{ margin:30px; padding:25px; border-radius:25px; background: var(--charcoal); border:1px solid rgba(255,255,255,0.05); }
.live-summary h3{ font-family:'Cinzel', serif; color:var(--gold); margin-bottom:15px; }
.summary-table{ width:100%; border-collapse: collapse; color:#fff; font-size:14px; }
.summary-table th, .summary-table td{ padding:12px 10px; text-align:left; }
.summary-table thead th{ border-bottom:2px solid var(--gold-light); color: var(--gold-light); font-weight:600; }
.summary-table tbody tr{ border-bottom:1px solid rgba(255,255,255,0.1); }
.summary-table tfoot tr{ border-top:2px solid var(--gold-light); font-weight:bold; font-size:16px; }
.summary-table tfoot .total-label{ text-align:right; color:var(--gold-light); }
.summary-table td, .summary-table th{ color:#ddd; }

/* Order Form */
.order-form{ margin:20px 30px; padding:20px; border-radius:15px; background: var(--glass); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.1); }
.order-form h2{ color:var(--gold); margin-bottom:15px; }
.section-title{ font-family:'Cinzel', serif; color:var(--gold); margin-bottom:15px; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:5px; }
.form-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:20px; }
.form-group label{ font-weight:600; margin-bottom:6px; color:#ccc; }

/* Responsive */
@media(max-width:768px){
  .hampers-grid{ grid-template-columns:1fr; padding:20px; }
  .form-grid{ grid-template-columns:1fr; gap:15px; }
  .slider{ height:200px; }
  .slider-arrow{ font-size:22px; padding:8px 12px; }
}
@media(max-width:480px){
  .brand-text{ font-size:18px; }
  .tagline{ font-size:10px; }
  .price{ font-size:16px; }
  button{ padding:10px 15px; font-size:14px; }
  .logo-area img{ height:40px; }
}
</style>
</head>

<body>

<div class="header">
  <div class="logo-area">
    <img src="Logo_Markitt.png" alt="Logo">
    <div>
      <div class="brand-text">Markitt Hamper Service</div>
      <div class="tagline">Serving Across Pakistan – Orders Worldwide</div>
    </div>
  </div>
  <div class="total-orders">💚 Orders Placed: <span id="ordersCounter">0</span></div>
</div>

<div class="container">

  <!-- Slider -->
  <div class="slider" id="slider">
    <span class="slider-arrow left" onclick="prevSlide()">❮</span>
    <span class="slider-arrow right" onclick="nextSlide()">❯</span>
    <img src="Slider_1.jpg" class="active">
    <img src="Markitt_Slide.jpg">
    <img src="Slider_1.jpg">
  </div>

  <!-- Currency Selector -->
  <div class="currency-select">
    <label>Select Currency:</label>
    <select id="currencySelect">
      <option value="PKR" data-country="Pakistan">🇵🇰 Pakistan - PKR (₨)</option>
      <option value="USD" data-country="United States">🇺🇸 United States - USD ($)</option>
      <option value="EUR" data-country="Germany">🇪🇺 Europe - EUR (€)</option>
    </select>
  </div>

  <!-- Hamper Grid -->
  <div class="hampers-grid" id="hampersGrid"></div>

  <!-- Live Summary -->
  <div class="live-summary">
    <h3>Live Order Summary</h3>
    <table class="summary-table">
      <thead>
        <tr>
          <th>Hamper</th>
          <th>Variety</th>
          <th>Qty</th>
          <th>Price</th>
          <th>Amount</th>
        </tr>
      </thead>
      <tbody id="summaryItems"></tbody>
      <tfoot>
        <tr>
          <td colspan="4" class="total-label">Total:</td>
          <td id="totalPrice">₨ 0</td>
        </tr>
      </tfoot>
    </table>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

<script>
// DOM Ready
document.addEventListener("DOMContentLoaded", function() {

  // Slider
  let slides=document.querySelectorAll('.slider img');
  let current=0;
  function showSlide(i){ slides.forEach((s,index)=>{s.classList.remove('active'); if(index===i)s.classList.add('active');}); }
  window.nextSlide=function(){ current=(current+1)%slides.length; showSlide(current); }
  window.prevSlide=function(){ current=(current-1+slides.length)%slides.length; showSlide(current); }
  setInterval(nextSlide,4000);

  // Hamper Data
  const hampers = [
    {name:"Hamper 1", varieties:{Basic:{price:3499, items:["Flour 5kg","Rice 1kg","Sugar 1kg"]}}},
    {name:"Hamper 2", varieties:{Basic:{price:5499, items:["Flour 5kg","Rice 2kg","Sugar 2kg"]}}},
    {name:"Hamper 3", varieties:{Basic:{price:6999, items:["Flour 10kg","Rice 3kg","Sugar 2kg"]}}}
  ];

  const grid = document.getElementById("hampersGrid");
  const currencySelect=document.getElementById("currencySelect");
  let exchangeRates = {};

  hampers.forEach((h,index)=>{
    const data = h.varieties.Basic;
    grid.innerHTML += `
      <div class="hamper-card" data-index="${index}" data-name="${h.name}" data-price="${data.price}">
        <img src="Hamper_${index+1}.jpg">
        <div class="hamper-content">
          <h3>${h.name}</h3>
          <div class="items-list">${data.items.join("<br>")}</div>
          <div class="price">₨ ${data.price}</div>
          <input type="number" class="qty" min="0" value="0">
        </div>
      </div>
    `;
  });

  // Summary
  let cart=[];
  function updateSummary(){
    const summary=document.getElementById("summaryItems");
    summary.innerHTML="";
    let total=0;
    cart=[];
    document.querySelectorAll(".hamper-card").forEach(card=>{
      const qty=parseInt(card.querySelector(".qty").value);
      if(qty>0){
        const price=parseFloat(card.dataset.price);
        const amount=price*qty;
        cart.push({name:card.dataset.name, price, qty, amount});
        total+=amount;
        summary.innerHTML+=`<tr><td>${card.dataset.name}</td><td>Basic</td><td>${qty}</td><td>₨ ${price}</td><td>₨ ${amount}</td></tr>`;
      }
    });
    document.getElementById("totalPrice").textContent="₨ "+total;
  }

  document.querySelectorAll(".qty").forEach(el=> el.addEventListener("input", updateSummary));
  currencySelect.addEventListener("change", updateSummary);

  // Orders Counter
  let ordersPlaced = localStorage.getItem("ordersPlaced") || 0;
  document.getElementById("ordersCounter").textContent = ordersPlaced;

});
</script>
</body>
</html>
